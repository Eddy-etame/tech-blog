security:
    access_denied_url: /
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
        App\Entity\User:
            algorithm: auto
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        admin:
            pattern: ^/admin
            provider: app_user_provider
            form_login:
                login_path: admin_login
                check_path: admin_login_check
                default_target_path: admin_dashboard
                enable_csrf: true
                failure_path: admin_login
                failure_handler: App\EventListener\AdminAuthenticationFailureHandler
            logout:
                path: /admin/logout
                target: /
        blogger:
            pattern: ^/blogger
            provider: app_user_provider
            form_login:
                login_path: blogger_login
                check_path: blogger_login_check
                default_target_path: blogger_dashboard
                enable_csrf: true
            logout:
                path: /blogger/logout
                target: /
        main:
            pattern: ^/
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login_check
                default_target_path: app_index
                enable_csrf: true
            logout:
                path: /logout
                target: /
    access_control:
        - { path: ^/admin/login_check, roles: PUBLIC_ACCESS }
        - { path: ^/admin$, roles: PUBLIC_ACCESS }
        - { path: ^/admin/, roles: ROLE_ADMIN }
        - { path: ^/blogger/login, roles: PUBLIC_ACCESS }
        - { path: ^/blogger/login_check, roles: PUBLIC_ACCESS }
        - { path: ^/blogger/register, roles: PUBLIC_ACCESS }
        - { path: ^/blogger, roles: ROLE_BLOGGER }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/login_check, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/alerts, roles: ROLE_USER }
        - { path: ^/mon-espace, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
